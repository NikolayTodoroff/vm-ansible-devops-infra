---
- name: Configure nginx web server
  hosts: web
  become: true
  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Deploy static index page
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>vm-ansible-devops-infra</title></head>
          <body>
            <h1>Deployed by Ansible</h1>
            <p>Configured via ADO pipeline on {{ ansible_host }}</p>
          </body>
          </html>
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'
      notify: Restart nginx

    - name: Allow HTTP through ufw
      community.general.ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Allow SSH through ufw
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Enable ufw
      community.general.ufw:
        state: enabled

    - name: Ensure nginx is running and enabled
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted