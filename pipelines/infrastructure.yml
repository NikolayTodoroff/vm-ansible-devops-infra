parameters:
  - name: runApply
    displayName: 'Apply changes'
    type: boolean
    default: false

  - name: environment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - prod

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: terraformVersion
    value: '1.15.5'
  - name: workingDirectory
    value: '$(System.DefaultWorkingDirectory)/infra/main'
  - name: backendResourceGroup
    value: 'rg-tfstate-${{ parameters.environment }}'
  - name: backendStorageAccount
    value: 'stvmansible${{ parameters.environment }}'
  - name: backendContainer
    value: 'tfstate'
  - name: backendKey
    value: 'vmansible-${{ parameters.environment }}.tfstate'
  - name: tfVarsFile
    value: '$(System.DefaultWorkingDirectory)/infra/env/${{ parameters.environment }}.tfvars'

stages:
  - stage: Validate
    displayName: 'Validate Terraform'
    jobs:
      - job: Validate
        displayName: 'Terraform Validate'
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - bash: terraform fmt -check -recursive
            displayName: 'Terraform Format Check'
            workingDirectory: $(workingDirectory)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: 'service_connection'
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(backendKey)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Validate'
            inputs:
              command: 'validate'
              workingDirectory: $(workingDirectory)

          - bash: |
              curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
            displayName: 'Install TFLint'

          - bash: |
              tflint --init --config=../.tflint.hcl
              tflint --config=../.tflint.hcl
            displayName: 'Run TFLint'
            workingDirectory: $(workingDirectory)

  - stage: Plan
    displayName: 'Plan Terraform'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: Plan
        displayName: 'Terraform Plan'
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: 'service_connection'
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(backendKey)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Plan'
            inputs:
              command: 'plan'
              workingDirectory: $(workingDirectory)
              environmentServiceNameAzureRM: 'service_connection'
              commandOptions: '-out=$(Pipeline.Workspace)/tfplan -var-file="$(tfVarsFile)"'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Plan'
            inputs:
              targetPath: '$(Pipeline.Workspace)/tfplan'
              artifactName: 'tfplan'

  - ${{ if eq(parameters.runApply, true) }}:
    - stage: Apply
      displayName: 'Apply Terraform'
      dependsOn: Plan
      condition: succeeded()
      jobs:
        - deployment: Apply
          displayName: 'Terraform Apply'
          pool:
            vmImage: 'ubuntu-latest'
          environment: 'infrastructure-${{ parameters.environment }}'
          strategy:
            runOnce:
              deploy:
                steps:
                  - checkout: self
                    displayName: 'Checkout Repository'

                  - task: TerraformInstaller@1
                    displayName: 'Install Terraform'
                    inputs:
                      terraformVersion: $(terraformVersion)

                  - task: TerraformTaskV4@4
                    displayName: 'Terraform Init'
                    inputs:
                      command: 'init'
                      workingDirectory: $(workingDirectory)
                      backendServiceArm: 'service_connection'
                      backendAzureRmResourceGroupName: $(backendResourceGroup)
                      backendAzureRmStorageAccountName: $(backendStorageAccount)
                      backendAzureRmContainerName: $(backendContainer)
                      backendAzureRmKey: $(backendKey)

                  - task: DownloadPipelineArtifact@2
                    displayName: 'Download Plan'
                    inputs:
                      artifactName: 'tfplan'
                      targetPath: '$(Pipeline.Workspace)/tfplan'

                  - task: TerraformTaskV4@4
                    displayName: 'Terraform Apply'
                    inputs:
                      command: 'apply'
                      workingDirectory: $(workingDirectory)
                      environmentServiceNameAzureRM: 'service_connection'
                      commandOptions: '$(Pipeline.Workspace)/tfplan/tfplan'

                  - task: AzureCLI@2
                    displayName: 'Export Terraform outputs'
                    inputs:
                      connectedServiceNameARM: 'service_connection'
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                        cd $(workingDirectory)
                        terraform output -json > $(Pipeline.Workspace)/tf-outputs.json
                        echo "Wrote outputs:"
                        cat $(Pipeline.Workspace)/tf-outputs.json

                  - task: PublishPipelineArtifact@1
                    displayName: 'Publish Terraform outputs'
                    inputs:
                      targetPath: '$(Pipeline.Workspace)/tf-outputs.json'
                      artifactName: 'tf-outputs'

  - stage: Ansible
    displayName: 'Configure VM with Ansible'
    dependsOn: Apply
    condition: succeeded()
    jobs:
      - job: Ansible
        displayName: 'Run Ansible Playbook'
        steps:
          - checkout: self

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Terraform outputs'
            inputs:
              artifactName: 'tf-outputs'
              targetPath: '$(Pipeline.Workspace)'

          - bash: |
              OUTPUTS=$(Pipeline.Workspace)/tf-outputs.json
              RG=$(jq -r '.resource_group_name.value' $OUTPUTS)
              VMIP=$(jq -r '.vm_public_ip.value' $OUTPUTS)
              NSG=$(jq -r '.nsg_name.value' $OUTPUTS)
              KV=$(jq -r '.key_vault_name.value' $OUTPUTS)

              if [ -z "$RG" ] || [ -z "$VMIP" ] || [ -z "$NSG" ] || [ -z "$KV" ]; then
                echo "ERROR: one or more outputs empty. RG=$RG VMIP=$VMIP NSG=$NSG KV=$KV"
                exit 1
              fi

              echo "##vso[task.setvariable variable=rgName]$RG"
              echo "##vso[task.setvariable variable=vmPublicIp]$VMIP"
              echo "##vso[task.setvariable variable=nsgName]$NSG"
              echo "##vso[task.setvariable variable=kvName]$KV"
            displayName: 'Parse Terraform outputs'

          - task: AzureCLI@3
            displayName: 'Open NSG for agent IP'
            inputs:
              connectedServiceNameARM: 'service_connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                AGENT_IP=$(curl -s ifconfig.me)
                echo "##vso[task.setvariable variable=agentIp]$AGENT_IP"
                az network nsg rule create \
                  --resource-group $(rgName) \
                  --nsg-name $(nsgName) \
                  --name AllowPipelineSSH-$(Build.BuildId) \
                  --priority 100 \
                  --direction Inbound --access Allow --protocol Tcp \
                  --destination-port-ranges 22 \
                  --source-address-prefixes ${AGENT_IP}/32 \
                  --destination-address-prefixes '*'

          - task: AzureCLI@3
            displayName: 'Pull SSH key and write inventory'
            inputs:
              connectedServiceNameARM: 'service_connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                mkdir -p ~/.ssh
                az keyvault secret show --vault-name $(kvName) \
                  --name vm-ssh-private-key --query value -o tsv > ~/.ssh/vm-key.pem
                chmod 600 ~/.ssh/vm-key.pem
                cat > $(Build.SourcesDirectory)/ansible/inventory.ini <<EOF
                [web]
                dev-vm ansible_host=$(vmPublicIp)

                [web:vars]
                ansible_user=azureuser
                ansible_ssh_private_key_file=~/.ssh/vm-key.pem
                ansible_python_interpreter=/usr/bin/python3
                ansible_ssh_common_args='-o KexAlgorithms=+diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa -o StrictHostKeyChecking=no'
                EOF

          - bash: |
              sudo apt-get update && sudo apt-get install -y ansible
              ansible-galaxy collection install community.general
            displayName: Install Ansible

          - bash: |
              cd $(Build.SourcesDirectory)/ansible
              ansible-playbook -i inventory.ini playbook.yml
            displayName: Run playbook

          - task: AzureCLI@3
            displayName: 'Close NSG rule'
            condition: always()
            inputs:
              connectedServiceNameARM: 'service_connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az network nsg rule delete \
                  --resource-group $(rgName) \
                  --nsg-name $(nsgName) \
                  --name AllowPipelineSSH-$(Build.BuildId)                      